# POC Test - fabric-cicd approach
name: Fabric POC Deploy

on:
  push:
    branches: [main]

jobs:
  deploy-to-prod:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install fabric-cicd
        run: |
          python -m pip install --upgrade pip
          pip install fabric-cicd

      - name: Deploy to Prod workspace
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
        run: |
          python -c "
          from fabric_cicd import FabricWorkspace, publish_all_items
          from azure.identity import ClientSecretCredential

          credential = ClientSecretCredential(
              tenant_id='${{ secrets.AZURE_TENANT_ID }}',
              client_id='${{ secrets.AZURE_CLIENT_ID }}',
              client_secret='${{ secrets.AZURE_CLIENT_SECRET }}'
          )

          workspace = FabricWorkspace(
              workspace_id='${{ secrets.FABRIC_PROD_WORKSPACE_ID }}',
              token_credential=credential,
              repository_directory='Corp/Bronze',
              item_type_in_scope=['Lakehouse', 'Report', 'SemanticModel']
          )

          publish_all_items(workspace)
          print('Deployment complete!')
          "
