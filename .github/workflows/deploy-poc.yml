name: Fabric POC Deploy

on:
  push:
    branches: [main]

jobs:
  sync-dev-workspace:
    runs-on: ubuntu-latest
    steps:
      - name: Get Fabric token
        id: token
        run: |
          TOKEN=$(curl -s -X POST \
            https://login.microsoftonline.com/${{ secrets.AZURE_TENANT_ID }}/oauth2/v2.0/token \
            -d client_id=${{ secrets.AZURE_CLIENT_ID }} \
            -d client_secret=${{ secrets.AZURE_CLIENT_SECRET }} \
            -d scope=https://analysis.windows.net/powerbi/api/.default \
            -d grant_type=client_credentials | jq -r .access_token)
          echo "token=$TOKEN" >> $GITHUB_OUTPUT

      - name: Sync dev workspace from Git
        run: |
          RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" -X POST \
            https://api.fabric.microsoft.com/v1/workspaces/${{ secrets.FABRIC_DEV_WORKSPACE_ID }}/git/updateFromGit \
            -H "Authorization: Bearer ${{ steps.token.outputs.token }}" \
            -H "Content-Type: application/json" \
            -d '{"conflictResolution": {"conflictResolutionPolicy": "PreferRemote", "remoteCommitHash": "HEAD"}}')
          echo "$RESPONSE"

  deploy-to-prod:
    needs: sync-dev-workspace
    runs-on: ubuntu-latest
    steps:
      - name: Get Fabric token
        id: token
        run: |
          TOKEN=$(curl -s -X POST \
            https://login.microsoftonline.com/${{ secrets.AZURE_TENANT_ID }}/oauth2/v2.0/token \
            -d client_id=${{ secrets.AZURE_CLIENT_ID }} \
            -d client_secret=${{ secrets.AZURE_CLIENT_SECRET }} \
            -d scope=https://analysis.windows.net/powerbi/api/.default \
            -d grant_type=client_credentials | jq -r .access_token)
          echo "token=$TOKEN" >> $GITHUB_OUTPUT

      - name: Trigger Power BI Deployment Pipeline
        run: |
          RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" -X POST \
            https://api.powerbi.com/v1.0/myorg/pipelines/${{ secrets.FABRIC_PIPELINE_ID }}/deployAll \
            -H "Authorization: Bearer ${{ steps.token.outputs.token }}" \
            -H "Content-Type: application/json" \
            -d '{
              "sourceStageOrder": 0,
              "isBackwardDeployment": false,
              "updateAppSettings": {"updateAppInTargetWorkspace": false},
              "options": {"allowOverwriteArtifact": true, "allowCreateArtifact": true}
            }')
          echo "$RESPONSE"
